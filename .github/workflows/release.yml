name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  update-tags:
    name: Update major and minor version tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR="${TAG%%.*}"
          MINOR="${TAG%.*}"
          {
            echo "tag=$TAG"
            echo "major=$MAJOR"
            echo "minor=$MINOR"
          } >> "$GITHUB_OUTPUT"

      - name: Update major version tag
        run: |
          git tag -f "${{ steps.version.outputs.major }}" "${{ steps.version.outputs.tag }}"
          git push -f origin "${{ steps.version.outputs.major }}"

      - name: Update minor version tag
        run: |
          git tag -f "${{ steps.version.outputs.minor }}" "${{ steps.version.outputs.tag }}"
          git push -f origin "${{ steps.version.outputs.minor }}"

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
